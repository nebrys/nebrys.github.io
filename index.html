<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ULPPL Premium Tracker</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <style>
        :root {
            --bg: #f3f4f6; --card: #ffffff; --primary: #2563eb; --primary-light: #eff6ff;
            --success: #10b981; --danger: #ef4444; --text-main: #0f172a;
            --text-muted: #64748b; --border: #e2e8f0; --shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            --set-bg: #e2e8f0;
        }
        body.dark {
            --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --primary-light: #1e3a8a;
            --text-main: #f8fafc; --text-muted: #cbd5e1; --border: #334155;
            --set-bg: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text-main); transition: background 0.3s, color 0.3s; padding-bottom: 120px; }
        
        header { background: var(--card); padding: 1rem; text-align: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        h1 { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
        .icon-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text-main); padding: 0.5rem; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { background: var(--bg); }

        .container { max-width: 600px; margin: 0 auto; padding: 1rem; }
        
        /* Tabs */
        .tabs { display: flex; margin-bottom: 1rem; gap: 0.5rem; background: var(--card); padding: 0.25rem; border-radius: 12px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 0.75rem; text-align: center; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--text-muted); transition: all 0.2s; }
        .tab.active { background: var(--primary); color: white; }

        /* Select Workout */
        .workout-selector { width: 100%; padding: 0.85rem; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text-main); font-size: 1rem; font-weight: 600; margin-bottom: 1rem; outline: none; box-shadow: var(--shadow); }

        /* Exercise Cards */
        .card { background: var(--card); border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .exo-title { font-weight: 700; font-size: 1.15rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; }
        .exo-meta-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .exo-meta { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); background: var(--bg); padding: 0.35rem 0.65rem; border-radius: 8px; display: flex; align-items: center; gap: 0.25rem; }
        
        /* Reps Selector Layout */
        .rep-picker-zone { display: flex; align-items: center; justify-content: space-between; background: var(--bg); padding: 0.75rem 1rem; border-radius: 12px; margin-bottom: 1rem; }
        .rep-label { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }
        .counter-tool { display: flex; align-items: center; gap: 0.75rem; }
        .btn-counter { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--card); color: var(--text-main); font-size: 1.2rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); }
        .btn-counter:active { transform: scale(0.9); }
        .rep-display { font-size: 1.2rem; font-weight: 700; min-width: 45px; text-align: center; color: var(--primary); }

        /* Sets Group */
        .sets-container { display: flex; gap: 0.6rem; flex-wrap: wrap; }
        .set-btn { flex: 1; min-width: 60px; height: 48px; border-radius: 10px; border: none; background: var(--set-bg); color: var(--text-main); font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .set-btn .set-num { font-size: 0.75rem; opacity: 0.6; font-weight: normal; }
        .set-btn.checked { background: var(--success); color: white; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }

        /* Floating Rest Timer */
        .timer-floating-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); padding: 1rem; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); display: none; z-index: 100; animation: slideUp 0.3s ease-out; }
        .timer-content { max-width: 600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .timer-info { display: flex; flex-direction: column; gap: 0.25rem; }
        .timer-title { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; }
        .timer-clock { font-size: 1.6rem; font-weight: 800; color: var(--primary); font-variant-numeric: tabular-nums; }
        .timer-actions { display: flex; gap: 0.5rem; }
        .btn-timer-opt { padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text-main); font-weight: 600; font-size: 0.85rem; cursor: pointer; }
        .btn-timer-opt.skip { background: var(--danger); color: white; border: none; }

        /* Actions Button */
        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 1.1rem; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-save:active { transform: scale(0.98); }
        
        /* History Section (Accordion) */
        .history-section { display: none; }
        .history-item { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1rem; margin-bottom: 0.75rem; cursor: pointer; box-shadow: var(--shadow); transition: background 0.2s; }
        .history-item:hover { background: var(--primary-light); }
        .history-summary { display: flex; justify-content: space-between; align-items: center; }
        .history-date { font-weight: 700; color: var(--text-main); }
        .history-routine-tag { background: var(--primary); color: white; padding: 0.25rem 0.5rem; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
        .history-score { font-size: 0.9rem; color: var(--text-muted); margin-top: 0.25rem; }
        
        .history-details { display: none; padding-top: 1rem; margin-top: 1rem; border-top: 1px dashed var(--border); animation: fadeIn 0.2s ease-in-out; }
        .history-details.active { display: block; }
        .history-exo-row { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 0.35rem 0; border-bottom: 1px solid var(--bg); }
        .history-exo-row:last-child { border-bottom: none; }
        .history-sets-logged { font-weight: bold; color: var(--success); }
        
        /* Utilities */
        #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--text-main); color: var(--bg); padding: 0.75rem 1.5rem; border-radius: 999px; font-weight: 700; font-size: 0.9rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 150; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        #toast.show { opacity: 1; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <button class="icon-btn" onclick="toggleTheme()" title="Mode Sombre/Clair">🌓</button>
        <h1>ULPPL Tracker</h1>
        <div style="width: 40px;"></div>
    </header>

    <div class="container">
        <div class="tabs">
            <div class="tab active" id="tab-workout" onclick="switchTab('workout')">Séance du jour</div>
            <div class="tab" id="tab-history" onclick="switchTab('history')">Historique</div>
        </div>

        <div id="view-workout">
            <select id="workoutSelect" class="workout-selector" onchange="loadWorkout()">
                <option value="0">Jour 1 : UPPER</option>
                <option value="1">Jour 2 : LOWER 1</option>
                <option value="2">Jour 4 : PUSH</option>
                <option value="3">Jour 5 : PULL</option>
                <option value="4">Jour 6 : LOWER 2</option>
            </select>
            
            <div id="exercisesContainer"></div>
            
            <button class="btn-save" onclick="saveSession()">💾 Enregistrer la Séance</button>
        </div>

        <div id="view-history" class="history-section">
            <div id="historyContainer"></div>
            <button onclick="clearHistory()" style="width:100%; margin-top:1.5rem; padding:0.85rem; background:var(--danger); color:white; border:none; border-radius:12px; cursor:pointer; font-weight:700; box-shadow: var(--shadow);">🗑️ Effacer tout l'historique</button>
        </div>
    </div>

    <div id="floatingTimer" class="timer-floating-bar">
        <div class="timer-content">
            <div class="timer-info">
                <span id="timerExoName" class="timer-title">Nom de l'exercice</span>
                <span id="timerClock" class="timer-clock">00:00</span>
            </div>
            <div class="timer-actions">
                <button class="btn-timer-opt" onclick="adjustTimer(30)">+30s</button>
                <button class="btn-timer-opt skip" onclick="stopTimer(true)">Passer ⏭️</button>
            </div>
        </div>
    </div>

    <div id="toast">Message</div>

    <script>
        const routines = [
            {
                name: "UPPER",
                exercises: [
                    { name: "(Single-arm) Banded shoulder press", sets: 3, reps: "8-15", rest: "2 min", defaultReps: 10 },
                    { name: "Banded pushup", sets: 4, reps: "8-15", rest: "2 min", defaultReps: 10 },
                    { name: "Neutral-grip Inverted row", sets: 4, reps: "8-15", rest: "2 min", defaultReps: 10 },
                    { name: "Lying weight pullovers", sets: 3, reps: "8-15", rest: "2 min", defaultReps: 10 },
                    { name: "Banded lateral raises", sets: 4, reps: "10-15", rest: "1.5 - 2 min", defaultReps: 10 },
                    { name: "Seated banded rear-delt row", sets: 3, reps: "8-15", rest: "2 min", defaultReps: 10 },
                    { name: "Superset: Biceps curl + Triceps ext.", sets: 2, reps: "10-15", rest: "1.5 - 2 min", defaultReps: 10 }
                ]
            },
            {
                name: "LOWER 1",
                exercises: [
                    { name: "Wall sits", sets: 3, reps: "Max", rest: "1 - 2 min", defaultReps: 45 },
                    { name: "Hamstring Bridge Walks", sets: 4, reps: "10-15", rest: "1.5 - 2 min", defaultReps: 10 },
                    { name: "Banded unilateral Glute Bridge", sets: 3, reps: "10-15", rest: "2 min", defaultReps: 10 },
                    { name: "Ball hamstring curl", sets: 3, reps: "10-15", rest: "1.5 - 2 min", defaultReps: 10 },
                    { name: "Side-Lying Hip Abduction", sets: 3, reps: "10-15", rest: "1 - 1.5 min", defaultReps: 10 },
                    { name: "Calf raises", sets: 4, reps: "10-15", rest: "1 - 1.5 min", defaultReps: 10 },
                    { name: "Stir the pot", sets: 3, reps: "Max", rest: "1 min", defaultReps: 30 }
                ]
            },
            {
                name: "PUSH",
                exercises: [
                    { name: "Decline Banded Close-grip pushup", sets: 3, reps: "10-15", rest: "2 min", defaultReps: 10 },
                    { name: "Banded Close-grip pushup", sets: 3, reps: "10-15", rest: "2 min", defaultReps: 10 },
                    { name: "Banded lateral raises (single-arm)", sets: 4, reps: "10-15", rest: "1.5 - 2 min", defaultReps: 10 },
                    { name: "Standing underhand band fly", sets: 2, reps: "10-15", rest: "1.5 - 2 min", defaultReps: 10 },
                    { name: "Banded triceps extensions", sets: 3, reps: "10-15", rest: "1.5 - 2 min", defaultReps: 10 },
                    { name: "Copenhagen Plank", sets: 3, reps: "Max", rest: "1 min", defaultReps: 30 }
                ]
            },
            {
                name: "PULL",
                exercises: [
                    { name: "Pullovers", sets: 3, reps: "10-15", rest: "2 min", defaultReps: 10 },
                    { name: "One arm weighted bag rows", sets: 3, reps: "8-15", rest: "2 min", defaultReps: 10 },
                    { name: "Prone rear delt flies", sets: 3, reps: "10-15", rest: "2 min", defaultReps: 10 },
                    { name: "Bent-over banded face pulls", sets: 4, reps: "10-15", rest: "1 - 1.5 min", defaultReps: 10 },
                    { name: "Single-arm banded curls", sets: 3, reps: "10-15", rest: "1.5 - 2 min", defaultReps: 10 },
                    { name: "Single-arm banded hammer curls", sets: 3, reps: "10-15", rest: "1.5 - 2 min", defaultReps: 10 }
                ]
            },
            {
                name: "LOWER 2",
                exercises: [
                    { name: "Wall sits", sets: 3, reps: "Max", rest: "1 - 2 min", defaultReps: 45 },
                    { name: "Hamstring Bridge Walks", sets: 4, reps: "10-15", rest: "1.5 - 2 min", defaultReps: 10 },
                    { name: "Banded unilateral Glute Bridge", sets: 3, reps: "10-15", rest: "2 min", defaultReps: 10 },
                    { name: "Reverse Hypers", sets: 3, reps: "10-15", rest: "2 min", defaultReps: 10 },
                    { name: "Calf raises", sets: 4, reps: "10-15", rest: "1 - 1.5 min", defaultReps: 10 },
                    { name: "Dip hold leg raises (or Dead bug)", sets: 3, reps: "Max", rest: "1 min", defaultReps: 30 }
                ]
            }
        ];

        let currentWorkoutState = [];
        let timerInterval = null;
        let timeRemaining = 0;

        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('ulppl_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function switchTab(tab) {
            document.getElementById('view-workout').style.display = tab === 'workout' ? 'block' : 'none';
            document.getElementById('view-history').style.display = tab === 'history' ? 'block' : 'none';
            document.getElementById('tab-workout').classList.toggle('active', tab === 'workout');
            document.getElementById('tab-history').classList.toggle('active', tab === 'history');
            if(tab === 'history') renderHistory();
        }

        function parseMinRest(restStr) {
            // Extrait la valeur minimale (ex: "1.5 - 2 min" -> 1.5)
            let clean = restStr.replace('min', '').trim();
            if (clean.includes('-')) {
                clean = clean.split('-')[0].trim();
            }
            return Math.round(parseFloat(clean) * 60);
        }

        function loadWorkout() {
            const index = document.getElementById('workoutSelect').value;
            const routine = routines[index];
            const container = document.getElementById('exercisesContainer');
            container.innerHTML = '';
            
            currentWorkoutState = routine.exercises.map(ex => ({
                name: ex.name,
                targetReps: ex.reps,
                selectedReps: ex.defaultReps,
                loggedSets: Array(ex.sets).fill(null) // null = not done, number = reps done
            }));

            currentWorkoutState.forEach((ex, exoIndex) => {
                let setsHtml = '';
                for(let i=0; i<ex.loggedSets.length; i++) {
                    setsHtml += `
                        <button class="set-btn" id="btn-exo-${exoIndex}-set-${i}" onclick="toggleSet(${exoIndex}, ${i})">
                            <span class="set-num">Set ${i+1}</span>
                            <span class="set-status-text">${i+1}</span>
                        </button>`;
                }

                container.innerHTML += `
                    <div class="card">
                        <div class="exo-title">${ex.name}</div>
                        <div class="exo-meta-row">
                            <span class="exo-meta">🔄 Cible : ${ex.targetReps}</span>
                            <span class="exo-meta">⏱️ Repos : ${routine.exercises[exoIndex].rest}</span>
                        </div>
                        
                        <div class="rep-picker-zone">
                            <span class="rep-label">Répétitions effectuées :</span>
                            <div class="counter-tool">
                                <button class="btn-counter" onclick="adjustRepCount(${exoIndex}, -1)">-</button>
                                <span class="rep-display" id="rep-display-${exoIndex}">${ex.selectedReps}</span>
                                <button class="btn-counter" onclick="adjustRepCount(${exoIndex}, 1)">+</button>
                            </div>
                        </div>

                        <div class="sets-container">${setsHtml}</div>
                    </div>
                `;
            });
        }

        function adjustRepCount(exoIndex, amount) {
            let newVal = currentWorkoutState[exoIndex].selectedReps + amount;
            if(newVal < 0) newVal = 0;
            currentWorkoutState[exoIndex].selectedReps = newVal;
            document.getElementById(`rep-display-${exoIndex}`).textContent = newVal;
        }

        function toggleSet(exoIndex, setIndex) {
            const setBtn = document.getElementById(`btn-exo-${exoIndex}-set-${setIndex}`);
            const statusTextSpan = setBtn.querySelector('.set-status-text');
            const exercise = currentWorkoutState[exoIndex];
            const rawRestString = routines[document.getElementById('workoutSelect').value].exercises[exoIndex].rest;

            if (exercise.loggedSets[setIndex] === null) {
                // Validation de la série
                const currentRepsInput = exercise.selectedReps;
                exercise.loggedSets[setIndex] = currentRepsInput;
                
                setBtn.classList.add('checked');
                statusTextSpan.textContent = currentRepsInput + ' r';
                
                // Lancement auto du timer intelligent (Repos Min)
                const seconds = parseMinRest(rawRestString);
                startTimer(exercise.name, seconds);
            } else {
                // Annulation de la série
                exercise.loggedSets[setIndex] = null;
                setBtn.classList.remove('checked');
                statusTextSpan.textContent = setIndex + 1;
                
                // Stopper le minuteur en cours si besoin
                stopTimer(false);
            }
        }

        /* TIMER ENGINE */
        function startTimer(exoName, seconds) {
            clearInterval(timerInterval);
            timeRemaining = seconds;
            
            document.getElementById('timerExoName').textContent = `Repos après : ${exoName}`;
            updateTimerUI();
            document.getElementById('floatingTimer').style.display = 'block';

            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerUI();

                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    triggerBeepNotification();
                    showToast("⏳ Repos terminé ! À la série suivante.");
                    document.getElementById('floatingTimer').style.display = 'none';
                }
            }, 1000);
        }

        function adjustTimer(seconds) {
            timeRemaining += seconds;
            updateTimerUI();
        }

        function stopTimer(hideUi) {
            clearInterval(timerInterval);
            if(hideUi) document.getElementById('floatingTimer').style.display = 'none';
        }

        function updateTimerUI() {
            const mins = Math.floor(timeRemaining / 60);
            const secs = timeRemaining % 60;
            document.getElementById('timerClock').textContent = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function triggerBeepNotification() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let timeOffset = 0;
                // Génère 3 bips dynamiques et motivants
                for (let i = 0; i < 3; i++) {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, audioCtx.currentTime + timeOffset); // Note La (A5)
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime + timeOffset);
                    gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + timeOffset + 0.2);
                    
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    osc.start(audioCtx.currentTime + timeOffset);
                    osc.stop(audioCtx.currentTime + timeOffset + 0.2);
                    timeOffset += 0.25;
                }
            } catch(e) {
                console.log("Audio non supporté ou bloqué par le navigateur", e);
            }
        }

        /* SESSION STORAGE & HISTORY MANAGEMENT */
        function saveSession() {
            const index = document.getElementById('workoutSelect').value;
            const routineName = routines[index].name;
            
            let totalSets = 0;
            let completedSets = 0;
            
            currentWorkoutState.forEach(ex => {
                totalSets += ex.loggedSets.length;
                completedSets += ex.loggedSets.filter(s => s !== null).length;
            });

            if (completedSets === 0) {
                showToast("⚠️ Tu n'as validé aucune série !");
                return;
            }

            const sessionRecord = {
                id: Date.now(),
                date: new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' }),
                routine: routineName,
                score: `${completedSets}/${totalSets} séries complétées`,
                exercises: currentWorkoutState.map(ex => ({
                    name: ex.name,
                    sets: [...ex.loggedSets]
                }))
            };

            let history = JSON.parse(localStorage.getItem('ulppl_v2_history') || '[]');
            history.unshift(sessionRecord);
            localStorage.setItem('ulppl_v2_history', JSON.stringify(history));

            showToast("💪 Séance enregistrée avec succès !");
            stopTimer(true);
            loadWorkout();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('ulppl_v2_history') || '[]');
            const container = document.getElementById('historyContainer');
            
            if (history.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:3rem; font-weight:600;">Aucun historique disponible.</div>';
                return;
            }

            container.innerHTML = history.map(item => {
                // Rendu des lignes d'exercices détaillées
                const exoDetailsHtml = item.exercises.map(ex => {
                    const setsStr = ex.sets.map((s, idx) => s !== null ? `S${idx+1}: <strong>${s}r</strong>` : `S${idx+1}: -`).join(' | ');
                    return `
                        <div class="history-exo-row">
                            <span style="max-width: 60%; text-align: left; font-weight:500;">${ex.name}</span>
                            <span class="history-sets-logged">${setsStr}</span>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="history-item" onclick="toggleHistoryAccordion(${item.id})">
                        <div class="history-summary">
                            <div>
                                <div class="history-date">📅 ${item.date}</div>
                                <div class="history-score">${item.score}</div>
                            </div>
                            <span class="history-routine-tag">${item.routine}</span>
                        </div>
                        <div id="details-${item.id}" class="history-details">
                            ${exoDetailsHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleHistoryAccordion(id) {
            const target = document.getElementById(`details-${id}`);
            if (target) {
                const isOpen = target.classList.contains('active');
                // Fermer les autres ouverts si on veut une UX épurée
                document.querySelectorAll('.history-details').forEach(el => el.classList.remove('active'));
                if (!isOpen) {
                    target.classList.add('active');
                }
            }
        }

        function clearHistory() {
            if(confirm("Confirmez-vous la suppression totale de votre historique ? Cette action est irréversible.")) {
                localStorage.removeItem('ulppl_v2_history');
                renderHistory();
                showToast("🗑️ Tout l'historique a été vidé.");
            }
        }

        // INITIALISATION ENGINE
        if(localStorage.getItem('ulppl_theme') === 'dark') document.body.classList.add('dark');
        loadWorkout();
    </script>
</body>
</html>
